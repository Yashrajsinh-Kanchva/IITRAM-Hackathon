<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal | Krishi Connect</title>
    <style>
        :root {
            --bg: #f2f7f1;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --admin: #14532d;
            --buyer: #0f766e;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top, #e8f5e9, var(--bg));
            color: var(--text);
            font-family: "Segoe UI", Arial, sans-serif;
        }
        .card {
            width: min(92vw, 520px);
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 14px 40px rgba(17, 24, 39, 0.12);
            padding: 28px;
            border: 1px solid #e5e7eb;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 1.6rem;
        }
        p {
            margin: 0 0 20px;
            color: var(--muted);
        }
        .actions {
            display: grid;
            gap: 12px;
        }
        .btn {
            display: block;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            padding: 12px 14px;
            border-radius: 10px;
            color: #fff;
            transition: transform 0.12s ease, opacity 0.12s ease;
        }
        .btn:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }
        .btn-admin { background: var(--admin); }
        .btn-buyer { background: var(--buyer); }
        .btn-farmer { background: #9a3412; }
        .hint {
            margin-top: 14px;
            font-size: 0.9rem;
            color: var(--muted);
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Choose Login Type</h1>
        <p>Select how you want to continue in Krishi Connect.</p>
        <div class="actions">
            <a class="btn btn-admin" href="/admin/login">Login As Admin</a>
            <a class="btn btn-buyer" href="/buyer/login.html">Login As Buyer</a>
            <a class="btn btn-farmer" href="/farmer">Login As Farmer</a>
        </div>
        <div class="hint">Both modules use the same MongoDB database: <strong>farm_to_market</strong>.</div>
    </main>
</body>
</html>
