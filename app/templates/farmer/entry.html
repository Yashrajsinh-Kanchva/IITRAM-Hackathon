<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome | KrishiConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('farmer_portal.static', filename='css/style.css') }}" />
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0faf4 0%, #e8f5ee 60%, #fff9f5 100%);
    }

    .entry-wrap {
      display: flex; flex-direction: column; align-items: center;
      width: 100%; padding: 2rem 1rem;
    }

    /* Logo */
    .entry-logo {
      display: flex; align-items: center; gap: .6rem;
      font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 1.4rem;
      color: var(--dark); margin-bottom: 2.5rem;
    }
    .entry-logo strong { color: var(--primary); }

    /* Card */
    .entry-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-md);
      padding: 2.8rem 2.4rem;
      max-width: 420px; width: 100%;
      position: relative; overflow: hidden;
    }
    .entry-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--accent));
    }

    .entry-hero-text {
      text-align: center; margin-bottom: 2rem;
    }
    .entry-hero-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem; font-weight: 700; color: var(--dark);
      margin-bottom: .45rem;
    }
    .entry-hero-text p { color: var(--mid); font-size: .9rem; line-height: 1.6; }

    .entry-form { display: flex; flex-direction: column; gap: .3rem; }

    .entry-error {
      background: #FEF2F2; border: 1px solid #FECACA;
      color: var(--error); border-radius: var(--r-sm);
      padding: .6rem .9rem; font-size: .84rem; font-weight: 500;
      margin-bottom: .8rem;
    }

    .entry-btn {
      display: flex; align-items: center; justify-content: center; gap: .45rem;
      margin-top: .6rem; width: 100%;
      background: var(--primary); color: #fff;
      border: none; border-radius: var(--r-sm);
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      padding: .85rem; cursor: pointer;
      box-shadow: 0 4px 16px rgba(45,106,79,.28);
      transition: .2s ease;
    }
    .entry-btn:hover { background: var(--primary-h); transform: translateY(-1px); }
    .entry-btn:active { transform: scale(.98); }

    .entry-note {
      text-align: center; color: var(--mid); font-size: .78rem;
      margin-top: 1.4rem; line-height: 1.6;
    }
    .entry-note svg { vertical-align: middle; margin-right: .2rem; }

    /* Feature pills */
    .entry-features {
      display: flex; flex-wrap: wrap; gap: .5rem;
      justify-content: center; margin-top: 1.5rem;
    }
    .feat-pill {
      display: inline-flex; align-items: center; gap: .3rem;
      background: var(--primary-pale); color: var(--primary);
      border-radius: var(--r-lg); padding: .28rem .75rem;
      font-size: .76rem; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="entry-wrap">

    <!-- Logo -->
    <div class="entry-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" fill="#D8F3DC"/>
        <path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 0 0 8 20C19 20 22 3 22 3c-1 2-8 2-10 5" fill="#2D6A4F"/>
      </svg>
      Krishi<strong>Connect</strong>
    </div>

    <!-- Card -->
    <div class="entry-card">
      <div class="entry-hero-text">
        <h1>Welcome, Farmer 🌾</h1>
        <p>Enter your name to access your farm dashboard and start selling directly to buyers</p>
      </div>

      {% if error %}
        <div class="entry-error">{{ error }}</div>
      {% endif %}

      <form class="entry-form" action="/farmer/entry" method="POST">
        <div class="form-group">
          <label for="farmerNameInput">Your Full Name <span class="req">*</span></label>
          <div class="input-box">
            <span class="iicon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
            </span>
            <input
              id="farmerNameInput"
              name="farmer_name"
              type="text"
              placeholder="e.g. Ramesh Patel"
              autocomplete="name"
              autofocus
              required
            />
          </div>
        </div>

        <button type="submit" class="entry-btn">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
          Enter My Farm
        </button>
      </form>

      <div class="entry-features">
        <span class="feat-pill">✓ Sell directly to buyers</span>
        <span class="feat-pill">✓ Real-time marketplace</span>
        <span class="feat-pill">✓ Secure payments</span>
      </div>

      <p class="entry-note">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Each farmer gets their own private profile and listings
      </p>
    </div>

  </div>
</body>
</html>
