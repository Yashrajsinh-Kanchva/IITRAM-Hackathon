{% extends "base.html" %}

{% block title %}Transactions{% endblock %}

{% block content %}
<div class="space-y-4">
  <div>
    <h2 class="text-2xl font-semibold">Transaction Monitoring</h2>
    <p class="mt-1 text-sm text-slate-600">Review payment states and escalate flagged transactions.</p>
  </div>

  <section class="rounded-xl bg-white p-4 shadow-sm">
    <div class="grid gap-3 md:grid-cols-4">
      <input id="filter-transaction-search" type="text" placeholder="Txn ref or order" class="rounded-lg border border-slate-300 px-3 py-2" />
      <select id="filter-transaction-payment" class="rounded-lg border border-slate-300 px-3 py-2">
        <option value="">All payment status</option>
        <option value="pending">Pending</option>
        <option value="paid">Paid</option>
        <option value="failed">Failed</option>
        <option value="refunded">Refunded</option>
      </select>
      <select id="filter-transaction-review" class="rounded-lg border border-slate-300 px-3 py-2">
        <option value="">All review states</option>
        <option value="pending_review">Pending Review</option>
        <option value="reviewed">Reviewed</option>
        <option value="flagged">Flagged</option>
      </select>
      <button id="transaction-search-btn" class="rounded-lg bg-brand-600 px-4 py-2 font-medium text-white">Apply Filters</button>
    </div>
  </section>

  <section class="rounded-xl bg-white p-4 shadow-sm">
    <div class="overflow-x-auto">
      <table class="min-w-full text-sm">
        <thead class="bg-slate-100 text-left text-slate-600">
          <tr>
            <th class="px-3 py-2">Transaction Ref</th>
            <th class="px-3 py-2">Order #</th>
            <th class="px-3 py-2">Amount</th>
            <th class="px-3 py-2">Payment Status</th>
            <th class="px-3 py-2">Review State</th>
            <th class="px-3 py-2">Action</th>
          </tr>
        </thead>
        <tbody id="transactions-body"></tbody>
      </table>
    </div>
    <div id="transactions-pagination" class="mt-4 flex items-center gap-2"></div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script>
  const transactionState = { page: 1 };

  function transactionFilters() {
    return {
      search: document.getElementById('filter-transaction-search').value,
      payment_status: document.getElementById('filter-transaction-payment').value,
      review_state: document.getElementById('filter-transaction-review').value,
    };
  }

  async function loadTransactions(page = 1) {
    transactionState.page = page;
    const params = new URLSearchParams({ page });
    const filters = transactionFilters();
    Object.entries(filters).forEach(([key, value]) => {
      if (value) params.set(key, value);
    });

    try {
      const data = await AdminApp.apiFetch(`/admin/api/transactions?${params.toString()}`);
      const body = document.getElementById('transactions-body');
      body.innerHTML = (data.items || []).map((item) => `
        <tr class="border-b border-slate-100">
          <td class="px-3 py-2">${AdminApp.escapeHtml(item.transaction_ref || '-')}</td>
          <td class="px-3 py-2">${AdminApp.escapeHtml(item.order_number || '-')}</td>
          <td class="px-3 py-2">${AdminApp.formatCurrency(item.amount || 0)}</td>
          <td class="px-3 py-2">
            <select data-transaction-payment="${item.id}" class="rounded border border-slate-300 px-2 py-1">
              ${['pending', 'paid', 'failed', 'refunded'].map((status) => `<option value="${status}" ${item.payment_status === status ? 'selected' : ''}>${status}</option>`).join('')}
            </select>
          </td>
          <td class="px-3 py-2">
            <select data-transaction-review="${item.id}" class="rounded border border-slate-300 px-2 py-1">
              ${['pending_review', 'reviewed', 'flagged'].map((status) => `<option value="${status}" ${item.review_state === status ? 'selected' : ''}>${status}</option>`).join('')}
            </select>
          </td>
          <td class="px-3 py-2">
            <button data-transaction-id="${item.id}" class="update-transaction rounded bg-slate-900 px-3 py-1.5 text-white">Update</button>
          </td>
        </tr>
      `).join('') || '<tr><td colspan="6" class="px-3 py-3 text-center text-slate-500">No transactions found</td></tr>';

      AdminApp.renderPagination('transactions-pagination', data.pagination, loadTransactions);
    } catch (error) {
      AdminApp.notify(error.message, 'error');
    }
  }

  document.getElementById('transaction-search-btn').addEventListener('click', () => loadTransactions(1));

  document.getElementById('transactions-body').addEventListener('click', async (event) => {
    const button = event.target.closest('.update-transaction');
    if (!button) return;

    const id = button.dataset.transactionId;
    const paymentStatus = document.querySelector(`select[data-transaction-payment="${id}"]`).value;
    const reviewState = document.querySelector(`select[data-transaction-review="${id}"]`).value;

    try {
      await AdminApp.apiFetch(`/admin/api/transactions/${id}/state`, {
        method: 'PATCH',
        body: JSON.stringify({ payment_status: paymentStatus, review_state: reviewState })
      });
      AdminApp.notify('Transaction state updated', 'success');
      loadTransactions(transactionState.page);
    } catch (error) {
      AdminApp.notify(error.message, 'error');
    }
  });

  loadTransactions();
</script>
{% endblock %}
