{% extends "base.html" %}

{% block title %}Users{% endblock %}

{% block content %}
<div class="space-y-4">
  <div>
    <h2 class="text-2xl font-semibold">User Management</h2>
    <p class="mt-1 text-sm text-slate-600">Filter users and update account status.</p>
  </div>

  <section class="rounded-xl bg-white p-4 shadow-sm">
    <div class="grid gap-3 md:grid-cols-4">
      <input id="filter-user-search" type="text" placeholder="Search by name/email" class="rounded-lg border border-slate-300 px-3 py-2" />
      <select id="filter-user-role" class="rounded-lg border border-slate-300 px-3 py-2">
        <option value="">All roles</option>
        <option value="farmer">Farmer</option>
        <option value="buyer">Buyer</option>
      </select>
      <select id="filter-user-status" class="rounded-lg border border-slate-300 px-3 py-2">
        <option value="">All status</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
        <option value="suspended">Suspended</option>
      </select>
      <button id="user-search-btn" class="rounded-lg bg-brand-600 px-4 py-2 font-medium text-white">Apply Filters</button>
    </div>
  </section>

  <section class="rounded-xl bg-white p-4 shadow-sm">
    <div class="overflow-x-auto">
      <table class="min-w-full text-sm">
        <thead class="bg-slate-100 text-left text-slate-600">
          <tr>
            <th class="px-3 py-2">
              <input id="users-select-all" type="checkbox" class="h-4 w-4 rounded border-slate-300" />
            </th>
            <th class="px-3 py-2">Name</th>
            <th class="px-3 py-2">Email</th>
            <th class="px-3 py-2">Role</th>
            <th class="px-3 py-2">Status</th>
            <th class="px-3 py-2">Action</th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
    </div>
    <div id="users-pagination" class="mt-4 flex items-center gap-2"></div>
  </section>
</div>

<div id="users-bulk-bar" class="pointer-events-none fixed bottom-4 left-1/2 z-40 w-[min(920px,calc(100vw-2rem))] -translate-x-1/2 translate-y-[100%] rounded-xl border border-slate-200 bg-white p-3 shadow-lg transition-transform duration-300 ease-[ease]">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <p id="users-selected-count" class="text-sm font-medium text-slate-700">0 items selected</p>
    <div class="flex flex-wrap items-center gap-2">
      <button data-user-bulk-action="activate" class="rounded-lg bg-brand-600 px-3 py-1.5 text-sm font-medium text-white">Activate</button>
      <button data-user-bulk-action="suspend" class="rounded-lg bg-slate-900 px-3 py-1.5 text-sm font-medium text-white">Suspend</button>
      <button data-user-bulk-action="delete" class="rounded-lg bg-rose-600 px-3 py-1.5 text-sm font-medium text-white">Delete</button>
      <button id="users-bulk-clear" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm">Clear</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const userState = { page: 1, selectedIds: new Set() };

  function userFilters() {
    return {
      search: document.getElementById('filter-user-search').value,
      role: document.getElementById('filter-user-role').value,
      status: document.getElementById('filter-user-status').value,
    };
  }

  async function loadUsers(page = 1) {
    userState.page = page;
    userState.selectedIds.clear();
    const params = new URLSearchParams({ page });
    const filters = userFilters();
    Object.entries(filters).forEach(([key, value]) => {
      if (value) params.set(key, value);
    });

    try {
      const data = await AdminApp.apiFetch(`/admin/api/users?${params.toString()}`);
      const body = document.getElementById('users-body');
      body.innerHTML = (data.items || []).map((item) => `
        <tr class="border-b border-slate-100">
          <td class="px-3 py-2">
            <input type="checkbox" class="user-row-check h-4 w-4 rounded border-slate-300" data-user-id="${item.id}" />
          </td>
          <td class="px-3 py-2">${AdminApp.escapeHtml(item.name || '-')}</td>
          <td class="px-3 py-2">${AdminApp.escapeHtml(item.email || '-')}</td>
          <td class="px-3 py-2">${AdminApp.escapeHtml(item.role || '-')}</td>
          <td class="px-3 py-2">
            <select data-user-id="${item.id}" class="user-status rounded border border-slate-300 px-2 py-1">
              ${['active', 'inactive', 'suspended'].map((status) => `<option value="${status}" ${item.status === status ? 'selected' : ''}>${status}</option>`).join('')}
            </select>
          </td>
          <td class="px-3 py-2">
            <button data-user-id="${item.id}" class="update-user rounded bg-slate-900 px-3 py-1.5 text-white">Update</button>
          </td>
        </tr>
      `).join('') || '<tr><td colspan="6" class="px-3 py-3 text-center text-slate-500">No users found</td></tr>';

      AdminApp.renderPagination('users-pagination', data.pagination, loadUsers);
      syncUsersSelectionUi();
    } catch (error) {
      AdminApp.notify(error.message, 'error');
    }
  }

  function syncUsersSelectionUi() {
    const checks = Array.from(document.querySelectorAll('.user-row-check'));
    checks.forEach((check) => {
      check.checked = userState.selectedIds.has(check.dataset.userId);
    });

    const selectedCount = userState.selectedIds.size;
    const allChecked = checks.length > 0 && selectedCount === checks.length;
    const selectAll = document.getElementById('users-select-all');
    selectAll.checked = allChecked;
    selectAll.indeterminate = selectedCount > 0 && !allChecked;

    document.getElementById('users-selected-count').textContent = `${selectedCount} items selected`;
    const bar = document.getElementById('users-bulk-bar');
    if (selectedCount > 0) {
      bar.classList.remove('translate-y-[100%]', 'pointer-events-none');
      bar.classList.add('translate-y-0', 'pointer-events-auto');
    } else {
      bar.classList.add('translate-y-[100%]', 'pointer-events-none');
      bar.classList.remove('translate-y-0', 'pointer-events-auto');
    }
  }

  function clearUsersSelection() {
    userState.selectedIds.clear();
    syncUsersSelectionUi();
  }

  async function runUsersBulkAction(action) {
    const ids = Array.from(userState.selectedIds);
    if (!ids.length) return;

    try {
      const result = await AdminApp.apiFetch('/admin/api/users/bulk-action', {
        method: 'POST',
        body: JSON.stringify({ ids, action })
      });
      const failedCount = (result.failed_ids || []).length;
      AdminApp.notify(`Bulk ${action} completed: ${result.success_count || 0} success, ${failedCount} failed`, failedCount ? 'info' : 'success');
      if ((result.errors || []).length) {
        AdminApp.notify(result.errors[0], 'error');
      }
      clearUsersSelection();
      loadUsers(userState.page);
    } catch (error) {
      AdminApp.notify(error.message, 'error');
    }
  }

  document.getElementById('user-search-btn').addEventListener('click', () => loadUsers(1));
  document.getElementById('users-select-all').addEventListener('change', (event) => {
    document.querySelectorAll('.user-row-check').forEach((check) => {
      if (event.target.checked) {
        userState.selectedIds.add(check.dataset.userId);
      } else {
        userState.selectedIds.delete(check.dataset.userId);
      }
    });
    syncUsersSelectionUi();
  });

  document.getElementById('users-body').addEventListener('click', async (event) => {
    const button = event.target.closest('.update-user');
    if (!button) return;

    const userId = button.dataset.userId;
    const select = document.querySelector(`.user-status[data-user-id="${userId}"]`);
    try {
      await AdminApp.apiFetch(`/admin/api/users/${userId}/status`, {
        method: 'PATCH',
        body: JSON.stringify({ status: select.value })
      });
      AdminApp.notify('User status updated', 'success');
      loadUsers(userState.page);
    } catch (error) {
      AdminApp.notify(error.message, 'error');
    }
  });

  document.getElementById('users-body').addEventListener('change', (event) => {
    const check = event.target.closest('.user-row-check');
    if (!check) return;

    if (check.checked) {
      userState.selectedIds.add(check.dataset.userId);
    } else {
      userState.selectedIds.delete(check.dataset.userId);
    }
    syncUsersSelectionUi();
  });

  document.querySelectorAll('[data-user-bulk-action]').forEach((button) => {
    button.addEventListener('click', () => runUsersBulkAction(button.dataset.userBulkAction));
  });

  document.getElementById('users-bulk-clear').addEventListener('click', clearUsersSelection);

  loadUsers();
</script>
{% endblock %}
