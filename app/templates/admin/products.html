{% extends "base.html" %}

{% block title %}Products{% endblock %}

{% block content %}
<div class="space-y-4">
  <div>
    <h2 class="text-2xl font-semibold">Product Moderation</h2>
    <p class="mt-1 text-sm text-slate-600">Review and moderate product listings.</p>
  </div>

  <section class="grid gap-4 sm:grid-cols-3">
    <button data-quality-card="excellent" class="quality-card rounded-xl bg-white p-4 text-left shadow-sm ring-1 ring-transparent hover:ring-emerald-300">
      <p class="text-xs text-slate-500">Excellent</p>
      <p id="quality-excellent" class="mt-2 text-2xl font-semibold text-emerald-700">0</p>
    </button>
    <button data-quality-card="good" class="quality-card rounded-xl bg-white p-4 text-left shadow-sm ring-1 ring-transparent hover:ring-amber-300">
      <p class="text-xs text-slate-500">Good</p>
      <p id="quality-good" class="mt-2 text-2xl font-semibold text-amber-700">0</p>
    </button>
    <button data-quality-card="poor" class="quality-card rounded-xl bg-white p-4 text-left shadow-sm ring-1 ring-transparent hover:ring-rose-300">
      <p class="text-xs text-slate-500">Poor</p>
      <p id="quality-poor" class="mt-2 text-2xl font-semibold text-rose-700">0</p>
    </button>
  </section>

  <section class="rounded-xl bg-white p-4 shadow-sm">
    <div class="grid gap-3 md:grid-cols-5">
      <input id="filter-product-search" type="text" placeholder="Search products" class="rounded-lg border border-slate-300 px-3 py-2" />
      <input id="filter-product-category" type="text" placeholder="Category" class="rounded-lg border border-slate-300 px-3 py-2" />
      <select id="filter-product-status" class="rounded-lg border border-slate-300 px-3 py-2">
        <option value="">All status</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
        <option value="hidden">Hidden</option>
      </select>
      <select id="filter-product-quality" class="rounded-lg border border-slate-300 px-3 py-2">
        <option value="">All quality</option>
        <option value="excellent">Excellent</option>
        <option value="good">Good</option>
        <option value="poor">Poor</option>
      </select>
      <button id="product-search-btn" class="rounded-lg bg-brand-600 px-4 py-2 font-medium text-white">Apply Filters</button>
    </div>
  </section>

  <section class="rounded-xl bg-white p-4 shadow-sm">
    <div class="overflow-x-auto">
      <table class="min-w-full text-sm">
        <thead class="bg-slate-100 text-left text-slate-600">
          <tr>
            <th class="px-3 py-2">
              <input id="products-select-all" type="checkbox" class="h-4 w-4 rounded border-slate-300" />
            </th>
            <th class="px-3 py-2">Product</th>
            <th class="px-3 py-2">Category</th>
            <th class="px-3 py-2">Price</th>
            <th class="px-3 py-2">Quality Score</th>
            <th class="px-3 py-2">Status</th>
            <th class="px-3 py-2">Review Note</th>
            <th class="px-3 py-2">Action</th>
          </tr>
        </thead>
        <tbody id="products-body"></tbody>
      </table>
    </div>
    <div id="products-pagination" class="mt-4 flex items-center gap-2"></div>
  </section>
</div>

<div id="products-bulk-bar" class="pointer-events-none fixed bottom-4 left-1/2 z-40 w-[min(920px,calc(100vw-2rem))] -translate-x-1/2 translate-y-[100%] rounded-xl border border-slate-200 bg-white p-3 shadow-lg transition-transform duration-300 ease-[ease]">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <p id="products-selected-count" class="text-sm font-medium text-slate-700">0 items selected</p>
    <div class="flex flex-wrap items-center gap-2">
      <button data-product-bulk-action="approve" class="rounded-lg bg-brand-600 px-3 py-1.5 text-sm font-medium text-white">Approve</button>
      <button data-product-bulk-action="reject" class="rounded-lg bg-rose-600 px-3 py-1.5 text-sm font-medium text-white">Reject</button>
      <button data-product-bulk-action="hide" class="rounded-lg bg-slate-900 px-3 py-1.5 text-sm font-medium text-white">Hide</button>
      <button id="products-bulk-clear" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm">Clear</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const productState = { page: 1, selectedIds: new Set() };

  function qualityBand(score) {
    if (score > 75) return 'excellent';
    if (score >= 40) return 'good';
    return 'poor';
  }

  function qualityPill(score) {
    const band = qualityBand(score);
    if (band === 'excellent') {
      return `<span class="inline-flex rounded-full bg-emerald-100 px-2 py-1 text-xs font-semibold text-emerald-700">${score} - Excellent</span>`;
    }
    if (band === 'good') {
      return `<span class="inline-flex rounded-full bg-amber-100 px-2 py-1 text-xs font-semibold text-amber-700">${score} - Good</span>`;
    }
    return `<span class="inline-flex rounded-full bg-rose-100 px-2 py-1 text-xs font-semibold text-rose-700">${score} - Poor</span>`;
  }

  function productFilters() {
    return {
      search: document.getElementById('filter-product-search').value,
      category: document.getElementById('filter-product-category').value,
      status: document.getElementById('filter-product-status').value,
      quality: document.getElementById('filter-product-quality').value,
    };
  }

  async function loadQualitySummary() {
    try {
      const summary = await AdminApp.apiFetch('/admin/api/products/quality-summary');
      document.getElementById('quality-excellent').textContent = summary.excellent ?? 0;
      document.getElementById('quality-good').textContent = summary.good ?? 0;
      document.getElementById('quality-poor').textContent = summary.poor ?? 0;
    } catch (error) {
      AdminApp.notify(error.message, 'error');
    }
  }

  async function loadProducts(page = 1) {
    productState.page = page;
    productState.selectedIds.clear();
    const params = new URLSearchParams({ page });
    const filters = productFilters();
    Object.entries(filters).forEach(([key, value]) => {
      if (value) params.set(key, value);
    });

    try {
      const data = await AdminApp.apiFetch(`/admin/api/products?${params.toString()}`);
      const body = document.getElementById('products-body');
      body.innerHTML = (data.items || []).map((item) => `
        <tr class="border-b border-slate-100">
          <td class="px-3 py-2">
            <input type="checkbox" class="product-row-check h-4 w-4 rounded border-slate-300" data-product-id="${item.id}" />
          </td>
          <td class="px-3 py-2">${AdminApp.escapeHtml(item.name || '-')}</td>
          <td class="px-3 py-2">${AdminApp.escapeHtml(item.category || '-')}</td>
          <td class="px-3 py-2">${AdminApp.formatCurrency(item.price || 0)}</td>
          <td class="px-3 py-2">${qualityPill(Number(item.quality_score || 0))}</td>
          <td class="px-3 py-2">
            <select data-product-id="${item.id}" class="product-status rounded border border-slate-300 px-2 py-1">
              ${['approved', 'rejected', 'hidden'].map((status) => `<option value="${status}" ${item.status === status ? 'selected' : ''}>${status}</option>`).join('')}
            </select>
          </td>
          <td class="px-3 py-2">
            <input data-product-note="${item.id}" value="${AdminApp.escapeHtml(item.review_note || '')}" class="w-full rounded border border-slate-300 px-2 py-1" placeholder="Optional note" />
          </td>
          <td class="px-3 py-2">
            <button data-product-id="${item.id}" class="update-product rounded bg-slate-900 px-3 py-1.5 text-white">Update</button>
          </td>
        </tr>
      `).join('') || '<tr><td colspan="8" class="px-3 py-3 text-center text-slate-500">No products found</td></tr>';

      AdminApp.renderPagination('products-pagination', data.pagination, loadProducts);
      syncProductsSelectionUi();
    } catch (error) {
      AdminApp.notify(error.message, 'error');
    }
  }

  function syncProductsSelectionUi() {
    const checks = Array.from(document.querySelectorAll('.product-row-check'));
    checks.forEach((check) => {
      check.checked = productState.selectedIds.has(check.dataset.productId);
    });

    const selectedCount = productState.selectedIds.size;
    const allChecked = checks.length > 0 && selectedCount === checks.length;
    const selectAll = document.getElementById('products-select-all');
    selectAll.checked = allChecked;
    selectAll.indeterminate = selectedCount > 0 && !allChecked;

    document.getElementById('products-selected-count').textContent = `${selectedCount} items selected`;
    const bar = document.getElementById('products-bulk-bar');
    if (selectedCount > 0) {
      bar.classList.remove('translate-y-[100%]', 'pointer-events-none');
      bar.classList.add('translate-y-0', 'pointer-events-auto');
    } else {
      bar.classList.add('translate-y-[100%]', 'pointer-events-none');
      bar.classList.remove('translate-y-0', 'pointer-events-auto');
    }
  }

  function clearProductsSelection() {
    productState.selectedIds.clear();
    syncProductsSelectionUi();
  }

  async function runProductsBulkAction(action) {
    const ids = Array.from(productState.selectedIds);
    if (!ids.length) return;

    try {
      const result = await AdminApp.apiFetch('/admin/api/products/bulk-action', {
        method: 'POST',
        body: JSON.stringify({ ids, action })
      });
      const failedCount = (result.failed_ids || []).length;
      AdminApp.notify(`Bulk ${action} completed: ${result.success_count || 0} success, ${failedCount} failed`, failedCount ? 'info' : 'success');
      if ((result.errors || []).length) {
        AdminApp.notify(result.errors[0], 'error');
      }
      clearProductsSelection();
      loadQualitySummary();
      loadProducts(productState.page);
    } catch (error) {
      AdminApp.notify(error.message, 'error');
    }
  }

  document.getElementById('product-search-btn').addEventListener('click', () => loadProducts(1));
  document.getElementById('products-select-all').addEventListener('change', (event) => {
    document.querySelectorAll('.product-row-check').forEach((check) => {
      if (event.target.checked) {
        productState.selectedIds.add(check.dataset.productId);
      } else {
        productState.selectedIds.delete(check.dataset.productId);
      }
    });
    syncProductsSelectionUi();
  });

  document.getElementById('products-body').addEventListener('click', async (event) => {
    const button = event.target.closest('.update-product');
    if (!button) return;

    const productId = button.dataset.productId;
    const status = document.querySelector(`.product-status[data-product-id="${productId}"]`).value;
    const reviewNote = document.querySelector(`input[data-product-note="${productId}"]`).value;

    try {
      await AdminApp.apiFetch(`/admin/api/products/${productId}/review`, {
        method: 'PATCH',
        body: JSON.stringify({ status, review_note: reviewNote })
      });
      AdminApp.notify('Product review updated', 'success');
      loadQualitySummary();
      loadProducts(productState.page);
    } catch (error) {
      AdminApp.notify(error.message, 'error');
    }
  });

  document.getElementById('products-body').addEventListener('change', (event) => {
    const check = event.target.closest('.product-row-check');
    if (!check) return;

    if (check.checked) {
      productState.selectedIds.add(check.dataset.productId);
    } else {
      productState.selectedIds.delete(check.dataset.productId);
    }
    syncProductsSelectionUi();
  });

  document.querySelectorAll('[data-product-bulk-action]').forEach((button) => {
    button.addEventListener('click', () => runProductsBulkAction(button.dataset.productBulkAction));
  });

  document.getElementById('products-bulk-clear').addEventListener('click', clearProductsSelection);
  document.querySelectorAll('[data-quality-card]').forEach((card) => {
    card.addEventListener('click', () => {
      const selectedBand = card.dataset.qualityCard;
      const qualityFilter = document.getElementById('filter-product-quality');
      qualityFilter.value = qualityFilter.value === selectedBand ? '' : selectedBand;
      loadProducts(1);
    });
  });

  loadQualitySummary();
  loadProducts();
</script>
{% endblock %}
