{% extends "base.html" %}

{% block title %}Error{% endblock %}

{% block content %}
<div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
  <p class="text-sm uppercase tracking-wide text-slate-500">Error {{ code }}</p>
  <h2 class="mt-1 text-2xl font-semibold">Something went wrong</h2>
  <p class="mt-3 text-slate-600">{{ message }}</p>
  <a href="{{ url_for('admin.dashboard') }}" class="mt-5 inline-flex rounded-lg bg-brand-600 px-4 py-2 text-white">Back to dashboard</a>
</div>
{% endblock %}

{% block public_content %}
<div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
  <p class="text-sm uppercase tracking-wide text-slate-500">Error {{ code }}</p>
  <h2 class="mt-1 text-2xl font-semibold">Something went wrong</h2>
  <p class="mt-3 text-slate-600">{{ message }}</p>
  <a href="{{ url_for('admin.login') }}" class="mt-5 inline-flex rounded-lg bg-brand-600 px-4 py-2 text-white">Back to login</a>
</div>
{% endblock %}
