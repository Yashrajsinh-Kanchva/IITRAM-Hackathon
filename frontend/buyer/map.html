<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Map | FarmLink</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        #map {
            height: 70vh;
            width: 100%;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            z-index: 1;
        }
        .map-container {
            margin-top: 2rem;
            position: relative;
        }
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            padding: 5px;
        }
        .leaflet-popup-content b {
            color: var(--primary);
            font-size: 1.1rem;
        }
        .nav-links a.active {
            color: var(--accent) !important;
            font-weight: 700;
        }
    </style>
</head>
<body style="background: var(--neutral-light)">

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span>FarmLink</span>
            </a>
            <nav class="nav-links">
                <a href="index.html">Marketplace</a>
                <a href="map.html" class="active">Map</a>
                <a href="wishlist.html">Wishlist</a>
                <a href="orders.html">My Orders</a>
                <a href="negotiations.html">My Negotiations</a>
                <span id="auth-link"><a href="login.html">Sign In</a></span>
                <a href="cart.html" class="cart-icon">🛒 Cart <span class="cart-badge" id="cart-badge">0</span></a>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1 class="display-font" style="font-size: 2.5rem; margin-bottom: 1rem">Agricultural Sourcing Map</h1>
        <p style="color:var(--neutral-mid); margin-bottom: 2rem">Visualize where your fresh produce is coming from. Click on markers to see product details.</p>
        
        <div class="map-container">
            <div id="map"></div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initMapView();
        });
    </script>
</body>
</html>
