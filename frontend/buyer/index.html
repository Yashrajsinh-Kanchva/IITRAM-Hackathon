<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishi Connect | Fresh from the Fields</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/navbar.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

    <!-- Header / Navbar -->
    <header></header>

    <!-- Main Content -->
    <main class="container marketplace-layout">
        
        <!-- Advanced Filters Sidebar -->
        <aside class="filters-sidebar">
            <div style="background: white; border-radius: 16px; padding: 1.5rem; border: 1px solid var(--border); position: sticky; top: 100px;">
                <h3 class="display-font" style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; color: var(--primary);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                    Filters
                </h3>
                
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.9rem;">Crop Type</label>
                    <select id="filter-category" class="input-field" style="width: 100%; border-radius: 8px; border: 1px solid var(--border); padding: 0.75rem;" onchange="applyFilters()">
                        <option value="all">All Crops</option>
                        <option value="vegetables">Vegetables</option>
                        <option value="fruits">Fruits</option>
                        <option value="grains">Grains</option>
                        <option value="dairy">Dairy</option>
                        <option value="honey">Honey</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.9rem;">Location (State)</label>
                    <select id="filter-location" class="input-field" style="width: 100%; border-radius: 8px; border: 1px solid var(--border); padding: 0.75rem;" onchange="applyFilters()">
                        <option value="all">All Locations</option>
                        <option value="Gujarat">Gujarat</option>
                        <option value="Maharashtra">Maharashtra</option>
                        <option value="Punjab">Punjab</option>
                        <option value="Haryana">Haryana</option>
                        <option value="Rajasthan">Rajasthan</option>
                        <option value="Karnataka">Karnataka</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.9rem;">Price Range (₹/kg)</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="number" id="filter-min-price" class="input-field" style="width: 100%; border-radius: 8px; border: 1px solid var(--border); padding: 0.75rem;" placeholder="Min" onkeyup="applyFilters()">
                        <input type="number" id="filter-max-price" class="input-field" style="width: 100%; border-radius: 8px; border: 1px solid var(--border); padding: 0.75rem;" placeholder="Max" onkeyup="applyFilters()">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.9rem;">Min Quantity (kg)</label>
                    <input type="number" id="filter-quantity" class="input-field" style="width: 100%; border-radius: 8px; border: 1px solid var(--border); padding: 0.75rem;" placeholder="e.g. 50" onkeyup="applyFilters()">
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.9rem;">Sort By</label>
                    <select id="filter-sort" class="input-field" style="width: 100%; border-radius: 8px; border: 1px solid var(--border); padding: 0.75rem;" onchange="applyFilters()">
                        <option value="default">Relevance</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="rating">Top Rated</option>
                    </select>
                </div>

                <button class="btn-auth" style="width: 100%; background: var(--neutral-light); color: var(--neutral-dark); border: 1px solid var(--border); padding: 0.75rem; border-radius: 8px; cursor: pointer; font-weight: 700; transition: background 0.2s;" onmouseover="this.style.background='#e5e7eb'" onmouseout="this.style.background='var(--neutral-light)'" onclick="resetFilters()">Reset All Filters</button>
            </div>
        </aside>

        <!-- Product Grid -->
        <section>
            <div id="product-count" style="margin-bottom: 1.5rem; color: var(--neutral-mid); font-weight: 700; font-size: 1.1rem;">Loading fresh products...</div>
            <div class="product-grid" id="product-grid">
                <!-- Products injected by app.js -->
            </div>
        </section>

    </main>

    <!-- Negotiation Modal -->
    <div id="negotiate-modal" class="drawer-overlay">
        <div class="auth-container">
            <h2 class="display-font" style="margin-bottom:0.5rem">Negotiate Price</h2>
            <p id="neg-product-name" style="font-weight:700; color:var(--primary); margin-bottom:1.5rem">--</p>
            
            <form onsubmit="submitNegotiation(event)">
                <input type="hidden" id="neg-product-id">
                <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem">
                    <span style="font-size:14px; color:var(--neutral-mid)">Original Price:</span>
                    <span id="neg-original-price" style="font-weight:700; text-decoration:line-through; color:#E25C5C">--</span>
                </div>
                
                <div class="form-group">
                    <label>Propose New Price (₹)</label>
                    <input type="number" id="neg-price" class="input-field" placeholder="Enter your best offer" required>
                </div>
                <div class="form-group">
                    <label>Message to Farmer</label>
                    <textarea id="neg-message" class="input-field" placeholder="Why should the farmer accept this?" rows="3" required></textarea>
                </div>
                
                <button type="submit" class="btn-auth">Send Negotiation Offer</button>
                <button type="button" class="filter-chip" style="width:100%; margin-top:10px" onclick="document.getElementById('negotiate-modal').style.display='none'">Cancel</button>
            </form>
        </div>
    </div>

    <!-- UI Components -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/imageMapper.js?v=20260328f"></script>
    <script src="js/navbar.js?v=20260328g"></script>
    <script src="js/app.js?v=20260328g"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initMarketplace(); // Load initial products
        });
    </script>
</body>
</html>
