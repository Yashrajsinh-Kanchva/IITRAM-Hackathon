<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Krishi Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/navbar.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        .buyer-profile-page {
            background: #f0fdf4;
            min-height: 100vh;
        }

        .profile-hero-bg {
            background: linear-gradient(135deg, #14532d 0%, #166534 100%);
            height: 200px;
            border-bottom: 2px solid #22c55e;
        }

        .profile-shell {
            margin-top: -80px;
            margin-bottom: 3rem;
        }

        .profile-card {
            max-width: 960px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 26px 54px rgba(15, 23, 42, 0.16);
            border: 1px solid #dcfce7;
            overflow: hidden;
        }

        .profile-top {
            padding: 2rem;
            background: linear-gradient(180deg, #f7fff9 0%, #ffffff 100%);
            border-bottom: 1px solid #dcfce7;
            display: flex;
            gap: 1.4rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .profile-avatar-large {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, #166534 0%, #22c55e 100%);
            color: #fff;
            font-size: 2.9rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            box-shadow: 0 10px 24px rgba(22, 101, 52, 0.35);
            border: 4px solid rgba(255,255,255,0.85);
        }

        .profile-name-wrap h1 {
            font-size: 2.35rem;
            color: #14532d;
            line-height: 1.1;
            margin-bottom: 0.35rem;
        }

        .profile-name-wrap p {
            color: #4b5563;
            font-size: 1.02rem;
            margin-bottom: 0.75rem;
        }

        .profile-chip-row {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .profile-chip {
            border-radius: 999px;
            padding: 0.35rem 0.72rem;
            font-size: 0.78rem;
            font-weight: 700;
            background: #dcfce7;
            color: #14532d;
            border: 1px solid #86efac;
        }

        .profile-grid {
            padding: 1.5rem 2rem 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .profile-panel {
            background: #f9fffb;
            border: 1px solid #dcfce7;
            border-radius: 14px;
            padding: 1rem 1.1rem;
        }

        .profile-panel h3 {
            color: #166534;
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            border-bottom: 1px dashed #d1fae5;
            padding: 0.56rem 0;
            color: #374151;
            font-size: 0.92rem;
        }

        .profile-row:last-child {
            border-bottom: none;
        }

        .profile-row strong {
            color: #14532d;
        }

        .profile-actions {
            display: grid;
            gap: 0.75rem;
        }

        .btn-soft {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            background: #ecfdf5;
            color: #166534;
            font-weight: 700;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .profile-top,
            .profile-grid {
                padding: 1.25rem;
            }

            .profile-grid {
                grid-template-columns: 1fr;
            }

            .profile-name-wrap h1 {
                font-size: 1.85rem;
            }
        }
    </style>
</head>
<body class="buyer-profile-page">

    <!-- Header / Navbar -->
    <header></header>

    <!-- Main Content -->
    <main>
        <section class="profile-hero-bg"></section>
        <section class="container profile-shell">
            <div class="profile-card">
                <div class="profile-top">
                    <div id="profile-avatar" class="profile-avatar-large">?</div>
                    <div class="profile-name-wrap">
                        <h1 id="profile-name" class="display-font">Loading...</h1>
                        <p id="profile-email">...</p>
                        <div class="profile-chip-row">
                            <span class="profile-chip">Premium Buyer</span>
                            <span class="profile-chip">Member Since 2026</span>
                            <span class="profile-chip">Secure Account</span>
                        </div>
                    </div>
                </div>

                <div class="profile-grid">
                    <div class="profile-panel">
                        <h3>Account Details</h3>
                        <div class="profile-row"><span>Account Type</span><strong>Buyer</strong></div>
                        <div class="profile-row"><span>Region</span><strong>India</strong></div>
                        <div class="profile-row"><span>Data Security</span><strong>Protected</strong></div>
                        <div class="profile-row"><span>Status</span><strong>Active</strong></div>
                    </div>

                    <div class="profile-panel">
                        <h3>Quick Actions</h3>
                        <div class="profile-actions">
                            <button class="btn-auth" onclick="window.location.href='orders.html'">📦 View My Orders</button>
                            <button class="btn-soft" onclick="window.location.href='wishlist.html'">❤️ Open Wishlist</button>
                            <button class="btn-soft" onclick="window.location.href='map.html'">🗺️ Explore Product Map</button>
                            <button class="btn-auth" style="background:#fee2e2; color:#b91c1c" onclick="logout()">🚪 Log Out</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/imageMapper.js?v=20260328f"></script>
    <script src="js/navbar.js?v=20260328g"></script>
    <script src="js/app.js?v=20260328g"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(userStr);
            document.getElementById('profile-name').innerText = user.name;
            document.getElementById('profile-email').innerText = user.email || 'No email associated with this account';
            document.getElementById('profile-avatar').innerText = user.name.charAt(0).toUpperCase();

            // Set page title dynamically
            document.title = `${user.name}'s Profile | Krishi Connect`;
        });
    </script>
</body>
</html>
