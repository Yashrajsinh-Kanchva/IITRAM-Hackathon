<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | FarmLink</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 3rem;
            text-align: center;
            border: 1px solid var(--border);
            max-width: 500px;
            margin: 4rem auto;
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary-pale);
            color: var(--primary);
            font-size: 3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-family: 'Playfair Display', serif;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border: 4px solid white;
        }

        .profile-stat-box {
            background: var(--neutral-light);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            text-align: left;
        }

        .profile-actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
    </style>
</head>
<body>

    <!-- Header / Navbar -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span>FarmLink</span>
            </a>
            
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search vegetables, fruits, grains...">
                <button onclick="window.location.href='index.html'">🔍</button>
            </div>

            <nav class="nav-links">
                <a href="index.html">Marketplace</a>
                <a href="map.html">Map</a>
                <a href="wishlist.html">Wishlist</a>
                <a href="orders.html">My Orders</a>
                <a href="negotiations.html">My Negotiations</a>
                <span id="auth-link"><a href="login.html">Sign In</a></span>
                <a href="cart.html" class="cart-icon">🛒 Cart <span class="cart-badge" id="cart-badge">0</span></a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <div class="profile-card">
            <div id="profile-avatar" class="profile-avatar-large">?</div>
            <h1 id="profile-name" class="display-font" style="font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary);">Loading...</h1>
            <p id="profile-email" style="color: var(--neutral-mid); margin-bottom: 2rem; font-size: 1.1rem; font-weight: 500;">...</p>
            
            <div class="profile-stat-box">
                <div style="font-size: 13px; color: var(--neutral-mid); text-transform: uppercase; font-weight: 700; margin-bottom: 8px;">Account Details</div>
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 8px;">
                    <span>Member Since</span>
                    <span style="font-weight: 700;">2026</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span>Account Type</span>
                    <span style="font-weight: 700; color: var(--primary);">Buyer</span>
                </div>
            </div>

            <div class="profile-actions">
                <button class="btn-auth" onclick="window.location.href='orders.html'" style="background: white; color: var(--neutral-dark); border: 2px solid var(--border); font-weight: 700;">📦 View My Orders</button>
                <button class="btn-auth" style="background: #FFEAEA; color: #E25C5C; border: none; font-weight: 700;" onclick="logout()">🚪 Log Out of Account</button>
            </div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(userStr);
            document.getElementById('profile-name').innerText = user.name;
            document.getElementById('profile-email').innerText = user.email || 'No email associated with this account';
            document.getElementById('profile-avatar').innerText = user.name.charAt(0).toUpperCase();

            // Set page title dynamically
            document.title = `${user.name}'s Profile | FarmLink`;
        });
    </script>
</body>
</html>
