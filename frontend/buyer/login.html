<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Krishi Connect</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: var(--primary-pale)">

    <div class="auth-container">
        <h2 class="auth-title">Welcome Back</h2>
        <form id="login-form" onsubmit="loginHandler(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="input-field" placeholder="name@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth">Login to Marketplace</button>
        </form>
        <p style="text-align:center; margin-top:1.5rem; font-size:14px">
            New to Krishi Connect? <a href="signup.html" style="color:var(--primary); font-weight:700; text-decoration:none">Create Account</a>
        </p>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/imageMapper.js?v=20260328f"></script>
    <script src="js/app.js?v=20260328f"></script>
</body>
</html>
