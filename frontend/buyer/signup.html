<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | FarmLink</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: var(--primary-pale)">

    <div class="auth-container">
        <h2 class="auth-title">Grow with Us</h2>
        <form id="signup-form" onsubmit="signupHandler(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" class="input-field" placeholder="E.g. John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="input-field" placeholder="name@email.com" required>
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth">Create Buyer Account</button>
        </form>
        <p style="text-align:center; margin-top:1.5rem; font-size:14px">
            Already have an account? <a href="login.html" style="color:var(--primary); font-weight:700; text-decoration:none">Sign In</a>
        </p>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/app.js"></script>
</body>
</html>
