<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Krishi Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/navbar.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

    <header></header>

    <main class="container">
        <h1 class="display-font" style="font-size: 2.5rem; margin-bottom: 2rem">Shopping Cart</h1>
        
        <div class="cart-layout">
            <!-- Left: List -->
            <div id="cart-list">
                <!-- Cart items injected by app.js -->
            </div>

            <!-- Right: Summary -->
            <div class="cart-summary" id="cart-summary-box">
                <h3 style="margin-bottom:1.5rem">Order Summary</h3>
                <div style="display:flex; justify-content:space-between; margin-bottom:0.75rem">
                    <span>Subtotal</span>
                    <span id="order-total" style="font-weight:700">₹0.00</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem">
                    <span>Delivery Fee</span>
                    <span>Free</span>
                </div>
                <hr style="margin-bottom:1.5rem; border:0.5px solid var(--border)">
                <button class="btn-auth" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
                <button class="filter-chip" onclick="window.location.href='index.html'" 
                        style="width:100%; padding:0.8rem; margin-top:10px">Continue Shopping</button>
            </div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/imageMapper.js?v=20260328f"></script>
    <script src="js/navbar.js?v=20260328g"></script>
    <script src="js/app.js?v=20260328g"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCartPage();
        });
    </script>
</body>
</html>
