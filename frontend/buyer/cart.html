<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | FarmLink</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span>FarmLink</span>
            </a>
            <nav class="nav-links">
                <a href="index.html">Marketplace</a>
                <a href="map.html">Map</a>
                <a href="wishlist.html">Wishlist</a>
                <a href="orders.html">My Orders</a>
                <a href="negotiations.html">My Negotiations</a>
                <span id="auth-link"><a href="login.html">Sign In</a></span>
                <a href="cart.html" class="cart-icon" style="color:var(--accent); font-weight:700">🛒 Cart <span class="cart-badge" id="cart-badge">0</span></a>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1 class="display-font" style="font-size: 2.5rem; margin-bottom: 2rem">Shopping Cart</h1>
        
        <div class="cart-layout">
            <!-- Left: List -->
            <div id="cart-list">
                <!-- Cart items injected by app.js -->
            </div>

            <!-- Right: Summary -->
            <div class="cart-summary" id="cart-summary-box">
                <h3 style="margin-bottom:1.5rem">Order Summary</h3>
                <div style="display:flex; justify-content:space-between; margin-bottom:0.75rem">
                    <span>Subtotal</span>
                    <span id="order-total" style="font-weight:700">₹0.00</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem">
                    <span>Delivery Fee</span>
                    <span>Free</span>
                </div>
                <hr style="margin-bottom:1.5rem; border:0.5px solid var(--border)">
                <button class="btn-auth" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
                <button class="filter-chip" onclick="window.location.href='index.html'" 
                        style="width:100%; padding:0.8rem; margin-top:10px">Continue Shopping</button>
            </div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCartPage();
        });
    </script>
</body>
</html>
