<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace | KrishiConnect Buyer</title>
    
    <!-- Google Fonts to match Farmer Side -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN for Hackathon speed) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#2D6A4F',
              'primary-light': '#52B788',
              'primary-pale': '#D8F3DC',
              accent: '#F4A261',
              'accent-dark': '#E76F51',
            },
            fontFamily: {
              sans: ['DM Sans', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <!-- Logo matching farmer side -->
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" fill="#D8F3DC"/>
                        <path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 0 0 8 20C19 20 22 3 22 3c-1 2-8 2-10 5" fill="#2D6A4F"/>
                    </svg>
                    <span class="font-bold text-xl text-primary font-serif">Krishi<span class="text-primary-light">Connect</span></span>
                </div>
                <div class="flex gap-6 font-medium text-sm text-gray-600">
                    <a href="/" class="text-primary border-b-2 border-primary py-5">Browse</a>
                    <a href="#" class="hover:text-primary transition py-5">My Offers</a>
                    <a href="#" class="hover:text-primary transition py-5">Orders</a>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-sm font-semibold text-gray-800">Taj Mahal Hotels</span>
                    <div class="w-8 h-8 rounded-full bg-accent text-white flex items-center justify-center font-bold">T</div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Header & Search -->
        <div class="mb-10 flex flex-col md:flex-row justify-between items-end gap-6">
            <div>
                <h1 class="text-4xl font-serif font-bold text-gray-900 mb-2">Marketplace</h1>
                <p class="text-gray-500">Source fresh produce directly from local verified farmers.</p>
            </div>
            
            <div class="flex-1 max-w-xl w-full flex gap-3">
                <div class="relative flex-1">
                    <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="searchInput" placeholder="Search crops (e.g. Tomatoes, Wheat)" class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary-light transition shadow-sm">
                </div>
                <div class="relative w-48 hidden sm:block">
                    <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <input type="text" id="locInput" placeholder="Location" class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary-light transition shadow-sm">
                </div>
            </div>
        </div>

        <!-- Product Grid -->
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Loading State -->
            <div class="col-span-full py-20 text-center text-gray-400">
                <svg class="animate-spin h-8 w-8 mx-auto mb-4 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Loading marketplace...
            </div>
        </div>

    </main>

    <script>
        const grid = document.getElementById('productGrid');
        const searchInput = document.getElementById('searchInput');
        const locInput = document.getElementById('locInput');

        // Fetch and render
        async function fetchProducts() {
            const q = searchInput.value;
            const loc = locInput.value;
            
            try {
                const res = await fetch(`/api/marketplace?q=${encodeURIComponent(q)}&loc=${encodeURIComponent(loc)}`);
                const data = await res.json();
                
                if (data.success) {
                    renderGrid(data.data);
                }
            } catch (err) {
                grid.innerHTML = '<div class="col-span-full py-10 text-center text-red-500">Failed to load marketplace.</div>';
            }
        }

        function renderGrid(products) {
            if (products.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-16 text-center text-gray-500 bg-white rounded-xl border border-gray-100 shadow-sm">
                        <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        No products found for your search.<br><span class="text-sm mt-1">Try tweaking your filters or removing location.</span>
                    </div>`;
                return;
            }

            // Optional: Sort so nearest/best shows up differently (Bonus requested by user)
            // Here just rendering sequentially.

            grid.innerHTML = products.map(p => {
                const isNego = p.price_type === 'negotiable';
                const priceBadge = isNego 
                    ? `<span class="bg-blue-50 text-blue-700 text-xs font-bold px-2 py-1 rounded-md border border-blue-100">Negotiable</span>`
                    : `<span class="bg-gray-100 text-gray-700 text-xs font-bold px-2 py-1 rounded-md">Fixed Price</span>`;
                
                // Construct farmer image fallback URL. Assume farmer endpoint might have an image in future, skip for now.
                
                // Fallback image handling
                const imgStr = p.image_path ? `<img src="http://127.0.0.1:5000/static/uploads/${p.image_path}" class="w-full h-48 object-cover group-hover:scale-105 transition duration-500" alt="${p.crop_name}">` 
                                            : `<div class="w-full h-48 bg-gray-100 flex items-center justify-center text-4xl group-hover:scale-105 transition duration-500">🌾</div>`;

                return `
                <a href="/product/${p.id}" class="group block bg-white rounded-xl overflow-hidden border border-gray-200 shadow-sm hover:shadow-xl hover:border-primary-light transition duration-300 flex flex-col">
                    <div class="relative overflow-hidden">
                        ${imgStr}
                        <div class="absolute top-3 right-3 flex flex-col gap-2 relative z-10">
                            ${priceBadge}
                        </div>
                    </div>
                    
                    <div class="p-5 flex-1 flex flex-col">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="text-lg font-bold text-gray-900">${p.crop_name}</h3>
                            <div class="text-right">
                                <span class="font-mono text-lg font-bold text-primary">₹${p.price}</span><span class="text-xs text-gray-500">/kg</span>
                            </div>
                        </div>
                        
                        <div class="text-sm text-gray-600 mb-4 font-medium flex-1">
                            Available: <span class="text-gray-900">${p.quantity} ${p.quantity_unit}</span>
                        </div>
                        
                        <div class="pt-4 border-t border-gray-100 flex items-center justify-between text-sm">
                            <div class="flex items-center gap-2 text-gray-700 truncate pr-2">
                                <div class="w-6 h-6 rounded-full bg-primary-pale text-primary flex items-center justify-center font-bold text-xs flex-shrink-0">
                                    ${p.farmer_name.charAt(0)}
                                </div>
                                <span class="truncate font-medium">${p.farmer_name}</span>
                            </div>
                            <div class="flex items-center gap-1 text-gray-500 flex-shrink-0">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                                <span>${p.location}</span>
                            </div>
                        </div>
                    </div>
                </a>
                `;
            }).join('');
        }

        // Event listeners (Debounced search for clean interaction)
        let timeout;
        const triggerSearch = () => {
            clearTimeout(timeout);
            timeout = setTimeout(fetchProducts, 300);
        };

        searchInput.addEventListener('input', triggerSearch);
        locInput.addEventListener('input', triggerSearch);

        // Initial load
        fetchProducts();
    </script>
</body>
</html>
